# https://help.github.com/en/articles/metadata-syntax-for-github-actions
name: 'GoReleaser Action'
description: 'GitHub Action for GoReleaser, a release automation tool for Go projects'
author: 'goreleaser'
branding:
  color: 'green'
  icon: 'package'

inputs:
  distribution:
    description: 'GoReleaser distribution (goreleaser, goreleaser-pro, or goreleaserx)'
    default: 'goreleaser'
    required: false
  version:
    description: 'GoReleaser version (e.g. ~> v2, v2.14.0-pro.1 for goreleaserx)'
    default: '~> v2'
    required: false
  goreleaserx-repo:
    description: 'GitHub repo for goreleaserx binaries (owner/repo)'
    default: 'codefuturist/goreleaser-pro-internal'
    required: false
  goreleaserx-token:
    description: 'GitHub token with read access to goreleaserx private repo'
    required: false
  args:
    description: 'Arguments to pass to GoReleaser'
    required: false
  workdir:
    description: 'Working directory (below repository root)'
    default: '.'
    required: false
  install-only:
    description: 'Just install GoReleaser'
    default: 'false'
    required: false

outputs:
  artifacts:
    description: 'Build result artifacts'
  metadata:
    description: 'Build result metadata'

runs:
  using: 'node24'
  main: 'dist/index.js'
